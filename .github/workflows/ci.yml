name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy các lần chạy cũ trên cùng nhánh khi có push mới
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  noop:
    name: No-op (legacy apps/ removed from CI)
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI is currently a no-op — apps/backend-gateway and apps/admin-dashboard are unused legacy code, excluded from lint/build."
