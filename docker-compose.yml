version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: aigg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme-mysql}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_governance_gateway}
      MYSQL_USER: ${MYSQL_USERNAME:-phpmyadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme-mysql}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aigg-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-gateway:
    build:
      context: ./apps/backend-gateway
      dockerfile: Dockerfile
    container_name: aigg-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    ports:
      - "${BACKEND_PORT:-3000}:3000"

volumes:
  mysql-data:
  redis-data:
